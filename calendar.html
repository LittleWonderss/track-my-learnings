<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track-My-Learnings Calendar | Data-Driven Insights</title>
  
  <!-- CDNs -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <span>Track-My-Learnings</span>
      </div>
      <div class="header-actions">
          <button class="btn btn-ghost" id="themeToggle" onclick="toggleTheme()" title="Toggle View Mode">
            <i class="fas fa-moon"></i>
          </button>
          <a href="revision.html" class="btn btn-ghost">
            <i class="fas fa-repeat"></i> <span>Revision</span>
          </a>
          <a href="index.html" class="btn btn-ghost">
            <i class="fas fa-arrow-left"></i> <span>Tracker</span>
          </a>
      </div>
    </header>

    <div class="dashboard-grid">
      <!-- Heatmap Main Card -->
      <main class="card heatmap-section">
        <h2><i class="fas fa-layer-group" style="color:var(--primary)"></i> Contribution History</h2>
        <p style="font-size: 0.9rem; color: var(--text-dim-light); margin-bottom: var(--space-lg);">
          Visualizing your daily learning commitments. Data is automatically synchronized from your progress.
        </p>
        
        <div class="heatmap-container">
          <div class="heatmap-scroll-area">
            <div class="heatmap-grid" id="heatmap">
              <!-- JS Injected -->
            </div>
          </div>
        </div>

        <div class="legend">
          <span>Less</span>
          <div class="legend-item" style="background: var(--level-0)"></div>
          <div class="legend-item" style="background: var(--level-1)"></div>
          <div class="legend-item" style="background: var(--level-2)"></div>
          <div class="legend-item" style="background: var(--level-3)"></div>
          <div class="legend-item" style="background: var(--level-4)"></div>
          <span>More</span>
        </div>
      </main>

      <!-- Stats Sidebar / Top on Mobile -->
      <aside class="stats-section">
        <div class="card">
          <h2><i class="fas fa-award" style="color:#f59e0b"></i> Performance</h2>
          <div class="streak-container">
            <div class="streak-icon">
              <i class="fas fa-fire pulse-effect"></i>
            </div>
            <div style="font-size: 2.25rem; font-weight: 800; color: var(--primary); text-align: center" id="currentStreak">0 Days</div>
            <div class="stat-tag" style="text-align: center">Current Streak</div>
          </div>

          <div class="stat-list">
            <div class="stat-entry">
              <span class="stat-tag">Personal Best</span>
              <span class="stat-num" id="maxStreak">0</span>
            </div>
            <div class="stat-entry">
              <span class="stat-tag">Total Mastered</span>
              <span class="stat-num" id="totalTopics">0</span>
            </div>
            <div class="stat-entry">
              <span class="stat-tag">Completion Rate</span>
              <span class="stat-num" id="focusScore">0%</span>
            </div>
          </div>
        </div>

        <div class="tip-banner" id="insightBox">
            Your learning footprint starts here.
        </div>
      </aside>
    </div>
  </div>

  <!-- Application Scripts -->
  <script src="js/state.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
